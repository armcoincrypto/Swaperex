server {
  listen 80;
  listen [::]:80;
  server_name dex.kobbex.com;

  location ^~ /.well-known/acme-challenge/ {
    default_type "text/plain";
    root /var/www/swaperex;
    try_files $uri =404;
  }

  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name dex.kobbex.com;

  root /var/www/swaperex;
  index index.html;

  ssl_certificate     /etc/letsencrypt/live/dex.kobbex.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/dex.kobbex.com/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
  add_header Strict-Transport-Security "max-age=86400" always;

  location ~* ^/assets/ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
  }

  location = /version.txt {
    add_header Cache-Control "no-cache, must-revalidate" always;
    try_files $uri =404;
  }

  # Monitoring ingest — isolated admin FastAPI on :8001.
  # MUST stay above the generic `/api/v1/` block: nginx prefers the most
  # specific match, and `location =` is exact-match, so this single path is
  # routed to the admin app while everything else under /api/v1/ continues
  # going to the Node signals service (port 4001) untouched.
  location = /api/v1/monitoring/events {
    proxy_pass http://127.0.0.1:8001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_read_timeout 15s;
    proxy_send_timeout 15s;
    client_max_body_size 1m;
  }

  # Read-only admin panel API (isolated FastAPI admin app on :8001).
  location ^~ /api/v1/admin/ {
    proxy_pass http://127.0.0.1:8001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_read_timeout 15s;
    proxy_send_timeout 15s;
  }

  # Signals backend proxy (health, signals API)
  location /api/v1/ {
    proxy_pass http://127.0.0.1:4001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Monitoring alias — same rich JSON as /api/v1/health (never SPA index.html).
  location = /api/health {
    proxy_pass http://127.0.0.1:4001/api/v1/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_read_timeout 15s;
    proxy_send_timeout 15s;
  }

  # CoinGecko proxy (screener markets)
  location /coingecko/ {
    proxy_pass http://127.0.0.1:4001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # RPC proxy (balance, tx history - bypasses CORS)
  location /rpc/ {
    proxy_pass http://127.0.0.1:4001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Content-Type "application/json";
  }

  # Explorer proxy (tx history - Etherscan/BSCScan)
  location /explorer/ {
    proxy_pass http://127.0.0.1:4001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # 1inch Swap API proxy (quotes + unsigned swap/approve payloads; API key server-side only)
  location /oneinch/ {
    proxy_pass http://127.0.0.1:4001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 15s;
    proxy_read_timeout 30s;
    proxy_send_timeout 15s;
  }

  # Dot-path probes (e.g. /.env): never fall through to SPA index.html.
  # Negative lookahead preserves /.well-known/ (ACME, etc.).
  location ~ /\.(?!well-known).* {
    return 404;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}
