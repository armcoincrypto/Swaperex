server {
  listen 80;
  listen [::]:80;
  server_name dex.kobbex.com;

  location ^~ /.well-known/acme-challenge/ {
    default_type "text/plain";
    root /var/www/swaperex;
    try_files $uri =404;
  }

  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name dex.kobbex.com;

  root /var/www/swaperex;
  index index.html;

  ssl_certificate     /etc/letsencrypt/live/dex.kobbex.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/dex.kobbex.com/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
  add_header Strict-Transport-Security "max-age=86400" always;

  location ~* ^/assets/ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }

  location = /index.html {
    add_header Cache-Control "no-cache";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Optional proxies (enable later)
  # location /api/ {
  #   rewrite ^/api/?(.*)$ /$1 break;
  #   proxy_pass http://127.0.0.1:8000;
  # }
  # location /api/v1/ {
  #   proxy_pass http://127.0.0.1:4001;
  # }
  # location = /health {
  #   proxy_pass http://127.0.0.1:4001/health;
  # }
}
