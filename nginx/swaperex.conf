##
## Swaperex — Nginx site config
##
## Deploy to: /etc/nginx/sites-available/swaperex
## Enable:    ln -sf /etc/nginx/sites-available/swaperex /etc/nginx/sites-enabled/swaperex
## Test:      nginx -t && systemctl reload nginx
##

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/swaperex;
    index index.html;

    # ── Security: block dotfiles (.env, .git, .htaccess, etc.) ──
    location ~ /\. {
        deny all;
        return 404;
    }

    # ── Security: block source maps ──
    location ~* \.map$ {
        deny all;
        return 404;
    }

    # ── API reverse proxy to backend-signals (:4001) ──
    location /api/ {
        proxy_pass http://127.0.0.1:4001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;
    }

    # ── Static assets: aggressive caching (Vite hashes filenames) ──
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── version.txt: never cache ──
    location = /version.txt {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # ── SPA fallback: serve index.html for all unmatched routes ──
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # ── Logging ──
    access_log /var/log/nginx/swaperex-access.log;
    error_log  /var/log/nginx/swaperex-error.log;
}
