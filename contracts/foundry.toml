[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.26"

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]
optimizer = true
optimizer_runs = 200
via_ir = true
bytecode_hash = "none"

[rpc_endpoints]
mainnet = "${MAINNET_RPC_URL}"
bsc = "${BSC_RPC_URL}"
